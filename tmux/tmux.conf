# --- Prefix: Ctrl+a instead of Ctrl+b ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- Reload config ---
bind r source-file ~/.tmux.conf \; display "tmux config reloaded"

# --- Vim-like pane navigation ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Splits ---
bind v split-window -h
bind s split-window -v

# --- Close pane ---
bind x kill-pane

# --- Worktree fleet ---
# prefix+f : fuzzy-switch between worktree sessions (the fleet).
bind f display-popup -E -w 60% -h 50% -S 'fg=#D498F8' "~/dev/dots/tmux/wt-switch.sh"

# Clear a session's attention flag once you switch into it.
set-hook -g client-session-changed 'set-option @attention 0'

# --- Windows (tabs) ---
bind c new-window
bind n next-window
bind p previous-window

# --- Faster escape ---
set -sg escape-time 0

# --- Mouse (optional but nice) ---
set -g mouse on

# --- Copy: mouse drag -> pbcopy ---
set -s set-clipboard on
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode    MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# --- Resize panes ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- TokyoNight-style status bar ---
# set -g status-style "bg=#1a1b26,fg=#c0caf5"
# set -g status-left-style "fg=#7aa2f7,bg=#1a1b26"
# set -g status-right-style "fg=#7aa2f7,bg=#1a1b26"
# set -g window-status-style "fg=#565f89,bg=#1a1b26"
# set -g window-status-current-style "fg=#1a1b26,bg=#7aa2f7"

# --- Cyberpunk status bar ---
set -g status-style "bg=#1b1d2b,fg=#c8d3f5"
set -g status-left-style "fg=#D498F8,bg=#1b1d2b"
set -g status-right-style "fg=#00FF9C,bg=#1b1d2b"

# Show "● <session>" for any fleet session whose agent is waiting on you.
set -g status-interval 5
set -g status-right "#[fg=#00FF9C,bold]#(~/dev/dots/tmux/wt-attention.sh)#[default,fg=#00FF9C]  %H:%M "

# Window list
set -g window-status-style "fg=#545e8a,bg=#1b1d2b"
set -g window-status-current-style "fg=#1b1d2b,bg=#D498F8,bold"

# Pane borders
set -g pane-border-style "fg=#444a73"
set -g pane-active-border-style "fg=#00FF9C"

# Messages / command prompt
set -g message-style "fg=#1b1d2b,bg=#D498F8,bold"
set -g message-command-style "fg=#1b1d2b,bg=#00FF9C,bold"

# Copy-mode selection
# NOTE: copy-mode-selection-style / copy-mode-position-style default to
# "#{E:mode-style}", which re-expands the style as a format string. That turns
# any "#F..." / "#H..." / "#W..." hex into a tmux format code (e.g. #FDF980 →
# *DF980, the current-window flag), so the selection ends up with no bg. Set
# them literally to avoid the re-expansion.
set -g mode-style "fg=#1b1d2b,bg=#FDF980,bold"
set -wg copy-mode-selection-style "fg=#1b1d2b,bg=#FDF980,bold"
set -wg copy-mode-position-style "fg=#1b1d2b,bg=#FDF980,bold"

set-option -g default-shell /opt/homebrew/bin/fish
set-option -g default-command /opt/homebrew/bin/fish
