# --- Prefix: Ctrl+a instead of Ctrl+b ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- Reload config ---
bind r source-file ~/.tmux.conf \; display "tmux config reloaded"

# --- Vim-like pane navigation ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- Splits ---
bind v split-window -h
bind s split-window -v

# --- Close pane ---
bind x kill-pane

# --- Worktree fleet ---
# prefix+f : fuzzy-switch between worktree sessions (the fleet).
bind f display-popup -E -w 66 -h 12 -S 'fg=#268bd3' "~/dev/dots/tmux/wt-switch.sh"

# Clear a session's attention flag once you switch into it.
set-hook -g client-session-changed 'set-option @attention 0'

# --- Windows (tabs) ---
bind c new-window
bind n next-window
bind p previous-window

# --- Faster escape ---
set -sg escape-time 0

# --- Mouse (optional but nice) ---
set -g mouse on

# --- Copy: mouse drag -> pbcopy ---
set -s set-clipboard on
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode    MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# --- Resize panes ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Status bar theme ---
# Toggle with the `theme` fish command (`theme solarized` / `theme default`),
# which rewrites the path below and live-reloads. Copy-mode styles are set
# literally in the sourced file: their default "#{E:mode-style}" re-expands
# "#F..." hex into a tmux format code, dropping the selection bg.
source-file ~/dev/dots/tmux/themes/cyberpunk.conf

set-option -g default-shell /opt/homebrew/bin/fish
set-option -g default-command /opt/homebrew/bin/fish
