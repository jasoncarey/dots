# Solarized Osaka status bar (craftzdog palette).
# Sourced by tmux.conf; switched by the `theme` fish command.
set -g status-style "bg=#002c38,fg=#9eabac"
set -g status-left-style "fg=#268bd3,bg=#002c38"
set -g status-right-style "fg=#268bd3,bg=#002c38"

# Show "● <session>" for any fleet session whose agent is waiting on you.
set -g status-interval 5
set -g status-right "#[fg=#268bd3,bold]#(~/dev/dots/tmux/wt-attention.sh)#[default,fg=#268bd3]  %H:%M "

# Window list
set -g window-status-style "fg=#9eabac,bg=#002c38"
set -g window-status-current-style "fg=#001014,bg=#268bd3,bold"

# Pane borders
set -g pane-border-style "fg=#063540"
set -g pane-active-border-style "fg=#268bd3"

# Messages / command prompt
set -g message-style "fg=#001014,bg=#268bd3,bold"
set -g message-command-style "fg=#001014,bg=#268bd3,bold"

# Copy-mode selection — set literally (see note in tmux.conf) to avoid
# #{E:mode-style} re-expanding "#F..." hex into a tmux format code.
set -g mode-style "fg=#fdf5e2,bg=#1a6397,bold"
set -wg copy-mode-selection-style "fg=#fdf5e2,bg=#1a6397,bold"
set -wg copy-mode-position-style "fg=#fdf5e2,bg=#1a6397,bold"
